services:
  postgres:
    image: postgres:16-alpine
    container_name: ocean-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ocean_regulation}
      POSTGRES_USER: ${POSTGRES_USER:-ocean_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ocean_pass}
    ports:
      - "5432:5432"
    volumes:
      - ocean-postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ocean_admin} -d ${POSTGRES_DB:-ocean_regulation}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: ocean-backend
    restart: unless-stopped
    environment:
      PORT: 8080
      DATABASE_URL: ${DATABASE_URL:-postgres://ocean_admin:ocean_pass@postgres:5432/ocean_regulation}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: ocean-frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api}
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  ocean-postgres-data:
